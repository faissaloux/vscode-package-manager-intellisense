name: Types Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  types-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [ 20.x ]

    name: Node ${{ matrix.node }} - ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v2
        with:
          node-version: ${{ matrix.node }}

      - name: Install dependencies
        run: yarn

      - name: Types check
        run: yarn type:check